services:
  - type: web
    name: nutritrackpro-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nutritrackpro-db
          property: connectionString
      - key: USDA_API_KEY
        sync: false

databases:
  - name: nutritrackpro-db
    databaseName: nutritrackpro
    user: nutritrackpro